<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virus Hunter: OVERDRIVE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #05010a;
            --panel: #1a022d;
            --hole: #000000;
            --accent: #39ff14;
            --enemy: #ff0055;
            --text: #ffffff;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            cursor: crosshair;
            user-select: none;
        }

        .header { text-align: center; margin-bottom: 15px; }
        h1 { color: var(--accent); letter-spacing: 2px; margin: 0; text-shadow: 0 0 10px var(--accent); font-size: 1.5rem; }
        .stats { display: flex; gap: 30px; font-size: 1rem; margin-top: 5px; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: var(--panel);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid var(--accent);
            position: relative;
        }

        .node {
            width: 90px;
            height: 90px;
            background: var(--hole);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
        }

        .virus {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--enemy);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            transition: top 0.05s linear; /* Ultra fast reaction */
            cursor: pointer;
            color: white;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .virus.active { top: 0; }
        .virus:active { background: #fff; transform: scale(0.9); }

        #result-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 8px;
        }

        #start-btn, .retry-btn {
            background: var(--accent);
            border: none;
            color: #000;
            padding: 15px 40px;
            font-weight: 900;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>OVERDRIVE MODE</h1>
        <div class="stats">
            <span>KILLS: <b id="score">0</b></span>
            <span>SEC: <b id="timer">15</b></span>
        </div>
    </div>

    <div class="game-grid">
        <div id="result-overlay">
            <h2 style="color:red">SCAN DONE</h2>
            <p style="font-size: 2rem">SCORE: <span id="final-score">0</span></p>
            <button class="retry-btn" onclick="startGame()">RETRY</button>
        </div>

        <div class="node"><div class="virus"><i class="fa-solid fa-bolt"></i></div></div>
        <div class="node"><div class="virus"><i class="fa-solid fa-bug"></i></div></div>
        <div class="node"><div class="virus"><i class="fa-solid fa-skull"></i></div></div>
        <div class="node"><div class="virus"><i class="fa-solid fa-ghost"></i></div></div>
        <div class="node"><div class="virus"><i class="fa-solid fa-fire"></i></div></div>
        <div class="node"><div class="virus"><i class="fa-solid fa-biohazard"></i></div></div>
        <div class="node"><div class="virus"><i class="fa-solid fa-radiation"></i></div></div>
        <div class="node"><div class="virus"><i class="fa-solid fa-spider"></i></div></div>
        <div class="node"><div class="virus"><i class="fa-solid fa-bomb"></i></div></div>
    </div>

    <button id="start-btn" onclick="startGame()" style="margin-top: 20px;">START SCAN</button>

    <script>
        const viruses = document.querySelectorAll('.virus');
        const scoreBoard = document.getElementById('score');
        const timerBoard = document.getElementById('timer');
        const startBtn = document.getElementById('start-btn');
        const resultOverlay = document.getElementById('result-overlay');
        const finalScoreDisplay = document.getElementById('final-score');
        
        let lastNode, timeUp, score, countdown;

        function peep() {
            // Instant spawn: 200ms to 500ms
            const time = Math.random() * (500 - 200) + 200;
            const idx = Math.floor(Math.random() * viruses.length);
            const virus = viruses[idx];

            if (virus === lastNode) return peep();
            lastNode = virus;

            virus.classList.add('active');
            setTimeout(() => {
                virus.classList.remove('active');
                if (!timeUp) peep();
            }, time);
        }

        function startGame() {
            score = 0;
            scoreBoard.textContent = 0;
            timeUp = false;
            startBtn.style.visibility = 'hidden';
            resultOverlay.style.display = 'none';
            
            let timeLeft = 15; // Shorter, more intense sessions
            timerBoard.textContent = timeLeft;

            peep();
            // Optional: Call peep twice for double viruses at once
            setTimeout(peep, 300);

            countdown = setInterval(() => {
                timeLeft--;
                timerBoard.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timeUp = true;
                    finalScoreDisplay.textContent = score;
                    resultOverlay.style.display = 'flex';
                    startBtn.style.visibility = 'visible';
                }
            }, 1000);
        }

        viruses.forEach(v => v.addEventListener('mousedown', function() {
            if(!this.classList.contains('active')) return;
            score++;
            this.classList.remove('active');
            scoreBoard.textContent = score;
        }));
    </script>
</body>
</html>
